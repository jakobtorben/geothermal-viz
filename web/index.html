<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeothermalViz – Oslo Borehole Map</title>
    <link rel="stylesheet" href="vendor/maplibre-gl.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="map"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1>🌍 GeothermalViz</h1>
            <p class="subtitle">Oslo Area Boreholes</p>
        </div>

        <div class="sidebar-section">
            <h2>Layers</h2>
            <div id="layer-controls">
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="energibronn" checked>
                    <span class="color-dot" style="background: #e74c3c;"></span>
                    Energy Wells (EnergiBrønn)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="grunnvannbronn" checked>
                    <span class="color-dot" style="background: #3498db;"></span>
                    Groundwater Wells (GrunnvannBrønn)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="bronnpark" checked>
                    <span class="color-dot" style="background: #2ecc71;"></span>
                    Well Parks (BrønnPark)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="sonderboring" checked>
                    <span class="color-dot" style="background: #f39c12;"></span>
                    Probe Drillings (Sonderboring)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="other" checked>
                    <span class="color-dot" style="background: #9b59b6;"></span>
                    Other (LGN, Springs)
                </label>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Statistics</h2>
            <div id="stats">
                <div class="stat-item">
                    <span class="stat-label">Total boreholes:</span>
                    <span class="stat-value" id="total-count">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Visible:</span>
                    <span class="stat-value" id="visible-count">—</span>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Selected Well</h2>
            <div id="well-info">
                <p class="no-selection">Click a well on the map to view details.</p>
            </div>
            <div id="sim-setup-action" class="sim-setup-action" style="display:none;">
                <button id="btn-setup-sim" class="btn-primary">⚡ Setup Simulation</button>
            </div>
        </div>
    </div>

    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">☰</button>

    <!-- Simulation side panel (right) -->
    <div id="sim-panel" class="sim-panel">
        <div class="sim-panel-header">
            <h2 id="sim-panel-title">Simulation Setup</h2>
            <button id="btn-close-sim" class="btn-icon" title="Close">✕</button>
        </div>

        <!-- Mode tabs -->
        <div class="sim-tabs">
            <button class="sim-tab active" data-tab="setup">⚙️ Setup</button>
            <button class="sim-tab" data-tab="results">📊 Results</button>
        </div>

        <!-- Setup mode -->
        <div id="sim-setup" class="sim-tab-content active">
            <div class="sim-case-info" id="sim-case-info"></div>
            <div class="sim-params" id="sim-params"></div>
            <div class="sim-viz-options">
                <h3>Visualization</h3>
                <label class="viz-toggle">
                    <input type="checkbox" id="chk-xsection">
                    Show geological cross-section
                </label>
                <div id="xsection-opacity-wrap" class="viz-opacity-wrap" style="display:none;">
                    <label for="xsection-opacity">Opacity</label>
                    <input type="range" id="xsection-opacity" min="0.1" max="1" step="0.05" value="0.55">
                </div>
            </div>
            <div class="sim-actions">
                <button id="btn-run-sim" class="btn-primary btn-run">▶ Run Simulation</button>
            </div>
            <div id="sim-status" class="sim-status" style="display:none;"></div>
            <div id="sim-output-log" class="sim-output-log" style="display:none;">
                <h4>Simulation Output</h4>
                <div id="sim-log-content" class="sim-log-content"></div>
            </div>
        </div>

        <!-- Results mode -->
        <div id="sim-results" class="sim-tab-content">
            <div id="sim-results-content">
                <p class="no-selection">Run a simulation to view results here.</p>
            </div>
        </div>
    </div>

    <script src="vendor/maplibre-gl.js"></script>
    <script src="js/app.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/wellbore-3d.js"></script>
</body>
</html>
