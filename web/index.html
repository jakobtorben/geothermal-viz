<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeothermalViz – Oslo Borehole Map</title>
    <link rel="stylesheet" href="vendor/maplibre-gl.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.plot.ly/plotly-gl3d-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
    <div id="map"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1>🌍 GeothermalViz</h1>
            <p class="subtitle">Oslo Area Boreholes</p>
        </div>

        <div class="sidebar-section">
            <h2>Layers</h2>
            <div id="layer-controls">
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="energibronn" checked>
                    <span class="color-dot" style="background: #e74c3c;"></span>
                    Energy Wells (EnergiBrønn)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="grunnvannbronn" checked>
                    <span class="color-dot" style="background: #3498db;"></span>
                    Groundwater Wells (GrunnvannBrønn)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="bronnpark" checked>
                    <span class="color-dot" style="background: #2ecc71;"></span>
                    Well Parks (BrønnPark)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="sonderboring" checked>
                    <span class="color-dot" style="background: #f39c12;"></span>
                    Probe Drillings (Sonderboring)
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" data-layer="other" checked>
                    <span class="color-dot" style="background: #9b59b6;"></span>
                    Other (LGN, Springs)
                </label>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Statistics</h2>
            <div id="stats">
                <div class="stat-item">
                    <span class="stat-label">Total boreholes:</span>
                    <span class="stat-value" id="total-count">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Visible:</span>
                    <span class="stat-value" id="visible-count">—</span>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Selected Well</h2>
            <div id="well-info">
                <p class="no-selection">Click a well on the map to view details.</p>
            </div>
            <div id="sim-setup-action" class="sim-setup-action" style="display:none;">
                <button id="btn-setup-sim" class="btn-primary">⚡ Setup Simulation</button>
            </div>
        </div>
    </div>

    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">☰</button>

    <!-- Simulation side panel (right) -->
    <div id="sim-panel" class="sim-panel">
        <div class="sim-panel-header">
            <h2 id="sim-panel-title">Simulation Setup</h2>
            <button id="btn-close-sim" class="btn-icon" title="Close">✕</button>
        </div>

        <!-- Mode tabs -->
        <div class="sim-tabs">
            <button class="sim-tab active" data-tab="setup">⚙️ Setup</button>
            <button class="sim-tab" data-tab="results">📊 Results</button>
        </div>

        <!-- Setup mode -->
        <div id="sim-setup" class="sim-tab-content active">
            <div class="sim-case-info" id="sim-case-info"></div>
            <div class="sim-params" id="sim-params"></div>
            <div class="sim-actions">
                <button id="btn-run-sim" class="btn-primary btn-run">▶ Run Simulation</button>
            </div>
            <div id="sim-status" class="sim-status" style="display:none;"></div>
            <div id="sim-output-log" class="sim-output-log" style="display:none;">
                <h4>Simulation Output</h4>
                <div id="sim-log-content" class="sim-log-content"></div>
            </div>
        </div>

        <!-- Results mode -->
        <div id="sim-results" class="sim-tab-content">
            <div id="sim-results-content">
                <p class="no-selection">Run a simulation to view results here.</p>
            </div>
        </div>
    </div>

    <!-- Full-screen results overlay -->
    <div id="results-overlay" class="results-overlay" style="display:none;">
        <div class="results-overlay-header">
            <div class="results-overlay-tabs">
                <button class="results-overlay-tab" data-tab="setup" id="overlay-tab-setup">⚙️ Setup</button>
                <button class="results-overlay-tab active" data-tab="results" id="overlay-tab-results">📊 Results</button>
            </div>
            <button id="btn-close-overlay" class="btn-icon results-close" title="Close results">✕</button>
        </div>
        <div class="results-overlay-body">
            <!-- Left column: Reservoir States -->
            <div class="results-col results-col-left">
                <div class="results-section-header">
                    <h3>🗺️ Reservoir States</h3>
                </div>
                <div class="results-controls">
                    <div class="results-control-row">
                        <label>Variable:</label>
                        <select id="reservoir-var-select" class="results-select"></select>
                    </div>
                    <div class="results-step-controls">
                        <button class="step-btn" id="step-first" title="First step">⏮</button>
                        <button class="step-btn" id="step-prev" title="Previous step">◀</button>
                        <button class="step-btn" id="step-play" title="Play">▶</button>
                        <button class="step-btn" id="step-next" title="Next step">▶</button>
                        <button class="step-btn" id="step-last" title="Last step">⏭</button>
                        <input type="range" id="step-slider" class="step-slider" min="0" max="0" value="0">
                        <span id="step-label" class="step-label">Step 1 / 1</span>
                    </div>
                    <label class="results-checkbox">
                        <input type="checkbox" id="show-delta">
                        Show difference from initial state
                    </label>
                </div>
                <div id="reservoir-3d-plot" class="reservoir-3d-plot"></div>
            </div>
            <!-- Right column: Well Output -->
            <div class="results-col results-col-right">
                <div class="results-section-header">
                    <h3>🧪 Well Output</h3>
                </div>
                <div class="results-controls">
                    <div class="results-control-row">
                        <label>Well:</label>
                        <select id="well-select" class="results-select"></select>
                    </div>
                    <div class="results-control-row">
                        <label>Variable:</label>
                        <select id="well-var-select" class="results-select"></select>
                    </div>
                </div>
                <div id="well-output-chart" class="well-output-chart">
                    <canvas id="well-chart-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/maplibre-gl.js"></script>
    <script src="js/app.js"></script>
    <script src="js/simulation.js"></script>
</body>
</html>
